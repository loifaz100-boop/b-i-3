name: Java CI with Maven

# 1. KÍCH HOẠT: Bất cứ khi nào có Push hoặc Pull Request vào nhánh main
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest # Báo GitHub mượn 1 cái máy ảo chạy Linux

    steps:
      - uses: actions/checkout@v3 # Bước 1: Copy code của bạn vào máy ảo

      - name: Set up JDK 21
        uses: actions/setup-java@v3 # Bước 2: Cài Java 21 lên máy ảo
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven # Bật cache để những lần sau tải thư viện cho nhanh

      - name: Build with Maven
        # Bước 3: Gõ lệnh vòng đời Maven! (Chạy Test và Đóng gói)
        run: mvn clean test package

      - name: Upload Artifact
        # Bước 4: Nhặt file .jar vừa được đóng gói xong và phơi ra ngoài cho tải về
        uses: actions/upload-artifact@v4
        with:
          name: ung-dung-da-dong-goi
          path: target/*.jar